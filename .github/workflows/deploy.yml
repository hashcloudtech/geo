name: Deploy VitePress to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress (with link check)
        run: |
          npm run build 2>&1 | tee build.log
          if grep -q "dead link" build.log; then
            echo "::warning::Found dead links in build output"
          fi

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "::error::Build failed: dist/index.html not found"
            exit 1
          fi
          if [ ! -f "dist/robots.txt" ]; then
            echo "::error::robots.txt not found in build output"
            exit 1
          fi
          if [ ! -f "dist/llms.txt" ]; then
            echo "::error::llms.txt not found in build output"
            exit 1
          fi
          echo "Build verification passed ✓"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
